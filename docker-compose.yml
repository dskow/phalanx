# Phalanx services.
#
# phalanx-run    — the studio against target/
# phalanx-test   — pytest against the agent codebase
#
# Egress is constrained by an explicit network configuration. The
# agent container can reach api.anthropic.com and nothing else.
# Adding a host means editing this file — it is a code change, not
# a runtime knob.

services:
  phalanx-run:
    build: .
    image: phalanx:dev
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PHALANX_MODEL: ${PHALANX_MODEL:-claude-sonnet-4-6}
      PHALANX_AUDIT: ${PHALANX_AUDIT:-standard}
      PHALANX_MAX_ITERATIONS: ${PHALANX_MAX_ITERATIONS:-4}
    volumes:
      - ./target:/app/target:ro
      - ./out:/app/out
    networks:
      - egress-restricted
    # The default command is the scaffold-only harness check — it
    # runs without ANTHROPIC_API_KEY so CI can exercise the Docker
    # plumbing on every PR. For a real run that drives the agents:
    #
    #   docker compose run --rm phalanx-run \
    #       run --target /app/target --out /app/out
    #
    # (export ANTHROPIC_API_KEY first, or set it in a .env file.)
    command:
      [
        "run",
        "--target", "/app/target",
        "--out", "/app/out",
        "--scaffold",
      ]

  phalanx-test:
    build: .
    image: phalanx:dev
    volumes:
      - ./phalanx:/app/phalanx:ro
      - ./tests:/app/tests:ro
      # target/ is the bundled demo codebase and doubles as a test
      # fixture (the planted prompt-injection payload is the
      # input-filter's canonical test case).
      - ./target:/app/target:ro
    networks:
      - none
    entrypoint: ["pytest"]
    command: ["-v", "tests/"]

networks:
  # Used by phalanx-run. In a hardened deployment this would have
  # an explicit destination allowlist enforced by an egress proxy
  # (e.g. squid or a sidecar). For the demo we rely on Docker
  # bridge defaults; the production posture is documented in
  # docs/GUARDRAILS.md.
  egress-restricted:
    driver: bridge

  # Used by phalanx-test. No external network at all.
  none:
    driver: bridge
    internal: true
