version: 2

# Three ecosystems track everything that can go stale or insecure:
# the agent project's Python deps, the target demo app's Python
# deps, the Dockerfile base image, and the GitHub Actions workflow
# action versions. Weekly is the right cadence — daily floods PRs,
# monthly lets CVEs sit too long.

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: pip
    directory: /target
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - target
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
